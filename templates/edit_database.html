{% extends 'base.html' %}
{% block title %}Edit Database{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Edit Database</h1>

    <form action="{{ url_for('databases_bp.edit_database', database_id=database[0]) }}" method="POST" class="row g-3">

        <div class="col-md-4">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" value="{{ database[1] }}" required>
        </div>

        <div class="col-md-3">
            <label class="form-label">Version</label>
            <input type="text" name="version" class="form-control" value="{{ database[2] }}">
        </div>

        <div class="col-md-5">
            <label class="form-label">IP Address</label>
            <input type="text" name="server_ip" class="form-control" value="{{ database[3] }}">
        </div>

        <div class="col-12">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control">{{ database[4] }}</textarea>
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('databases_bp.databases') }}" class="btn btn-secondary ms-2">Cancel</a>
        </div>

    </form>
</div>
{% endblock %}
